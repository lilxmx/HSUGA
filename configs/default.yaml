# HSUGA Default Configuration
# Override with model-specific and dataset-specific configs

model:
  name: hsuga_sasrec
  hidden_size: 64
  trm_num: 2
  num_heads: 1
  num_layers: 1
  dropout_rate: 0.5
  max_len: 200
  freeze_llm_emb: true
  use_cross_att: true

training:
  batch_size: 128
  lr: 0.001
  epochs: 200
  patience: 20
  watch_metric: "NDCG@10"
  seed: 42
  num_workers: 4
  gpu_id: 0
  log: true

alignment:
  alpha: 0.1
  sim_func: kd
  sim_user_num: 6
  sim_long_user_num: 6
  filter_metric: pearson
  similar_gate: -1.0
  sim_filter_percentile: 0.0

dataset:
  name: steam
  data_dir: ./data
  inter_file: inter
  ts_user: 16
  ts_item: 69
  test_neg: 100
  train_neg: 1

output:
  save_dir: ./saved
  check_path: ""
  log_dir: ./log
